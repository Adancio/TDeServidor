<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Mensaje enviado · Adán Juárez</title>
        <link rel="stylesheet" href="/style.css">
    </head>

    <body>

        <nav>
            <a href="/" class="nav-brand">Adán Juárez</a>
            <div class="nav-links">
                <a href="/">Inicio</a>
                <a href="/contacto">Contacto</a>
            </div>
        </nav>

        <div class="confirm-wrapper">

            <div class="confirm-icon">
                <svg width="34" height="34" viewBox="0 0 24 24" fill="none"
                     stroke="#16a34a" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <h1>¡Mensaje enviado!</h1>
            <p>Gracias por escribirme. Te respondo en menos de 24 horas.</p>

            <div class="confirm-actions">
                <a href="/contacto" class="btn-primary-outline">Enviar otro</a>
                <a href="/" class="btn-primary-solid">Volver al inicio</a>
            </div>

        </div>

        <footer>
            © 2026 Adán Juárez · Hecho con Node.js &amp; Express
        </footer>
